apiVersion: v1
kind: Service
metadata:
  name: api-read-svc
spec:
  type: {{ .Values.apiRead.service.type }}
  ports:
    - port: {{ .Values.apiRead.service.port }}
      targetPort: {{ .Values.apiRead.service.targetPort }}
      nodePort: {{ .Values.apiRead.service.nodePort }}
  selector:
    app: {{ .Values.apiRead.app }}