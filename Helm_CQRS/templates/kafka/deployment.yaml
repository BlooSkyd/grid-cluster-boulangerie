apiVersion: apps/v1
kind: Deployment
metadata:
  name: helm-cqrs-kafka
  labels:
    app: {{ .Values.kafka.name}}
spec:
  replicas: {{ .Values.kafka.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.kafka.name}}
  template:
    metadata:
      labels:
        app: {{ .Values.kafka.name}}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.kafka.image.repository }}:{{ .Values.kafka.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.kafka.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.kafka.service.port }}
          env:
          - name: KAFKA_BROKER_ID
            value: "{{ .Values.kafka.env.brokerId }}"
          - name: KAFKA_ZOOKEEPER_CONNECT
            value: "{{ .Values.kafka.env.zookeeperConnect }}"
          - name: KAFKA_LISTENERS
            value: "{{ .Values.kafka.env.listeners }}"
          - name: KAFKA_ADVERTISED_LISTENERS
            value: "{{ .Values.kafka.env.advertisedListeners }}"
          - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
            value: "{{ .Values.kafka.env.offsetsTopicReplicationFactor }}"
          - name: KAFKA_HEAP_OPTS
            value: "{{ .Values.kafka.env.heapOpts }}"