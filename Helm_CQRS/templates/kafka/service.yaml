apiVersion: v1
kind: Service
metadata:
  name: kafka-svc
spec:
  type: {{ .Values.kafka.service.type }}
  ports:
    - port: {{ .Values.kafka.service.port }}
      targetPort: {{ .Values.kafka.service.targetPort }}
      nodePort: {{ .Values.kafka.service.nodePort }}
  selector:
    app: {{ .Values.kafka.app }}