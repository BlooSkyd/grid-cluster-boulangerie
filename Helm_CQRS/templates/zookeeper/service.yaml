apiVersion: v1
kind: Service
metadata:
  name: zookeeper-svc
spec:
  type: {{ .Values.zookeeper.service.type }}
  ports:
    - port: {{ .Values.zookeeper.service.port }}
      targetPort: {{ .Values.zookeeper.service.targetPort }}
      nodePort: {{ .Values.zookeeper.service.nodePort }}
  selector:
    app: {{ .Values.zookeeper.app }}